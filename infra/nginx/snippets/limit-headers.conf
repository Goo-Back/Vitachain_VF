# AUTH-08 — Rate-limit observability headers.
# Included from each protected location so legitimate clients see which bucket
# applies to a given path. NGINX OSS does not expose remaining-tokens; only
# the bucket identity and the configured rate are conveyed. `always` ensures
# the headers ride on error responses too (especially 429s).

add_header X-RateLimit-Policy "vitachain-auth08" always;

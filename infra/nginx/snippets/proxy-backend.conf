# AUTH-08 — Shared `proxy_pass` block for FastAPI upstream locations.
# Included from every /api/v1/* sub-location patched in by AUTH-08 so the
# proxy semantics stay byte-identical across endpoints. Per-location overrides
# (e.g. tighter timeouts on /katara/ingest) appear AFTER the `include` so
# they win NGINX's directive-resolution.

proxy_pass         http://vita_backend;
proxy_http_version 1.1;

proxy_set_header   Host              $host;
proxy_set_header   X-Real-IP         $remote_addr;
proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto $scheme;
proxy_set_header   X-Forwarded-Host  $host;
proxy_set_header   X-Request-Id      $request_id;

proxy_connect_timeout 5s;
proxy_send_timeout    300s;
proxy_read_timeout    300s;

client_max_body_size  10m;

proxy_intercept_errors on;
error_page 502 503 504 /50x.html;

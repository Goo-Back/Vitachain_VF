# tls.conf — shared TLS profile (INF-06). Included from every :443 server.
# Mozilla intermediate baseline — supports TLSv1.2+ only, modern AEAD ciphers,
# OCSP stapling, 1-day session resumption.
#
# WARNING: NGINX will fail to start if the certificate paths below don't
# exist yet. On a fresh VPS, follow the §5.11 "bootstrap dance" in
# docs/stories/INF-06-https-letsencrypt-certbot.md — comment out the :443
# server block in default.conf, deploy, issue the cert, then uncomment.

ssl_certificate         /etc/letsencrypt/live/vitachain.ma/fullchain.pem;
ssl_certificate_key     /etc/letsencrypt/live/vitachain.ma/privkey.pem;
ssl_trusted_certificate /etc/letsencrypt/live/vitachain.ma/chain.pem;

# Certbot drops these into /etc/letsencrypt the first time it runs; they
# encode the Mozilla intermediate profile (TLSv1.2+1.3, modern cipher list).
include                 /etc/letsencrypt/options-ssl-nginx.conf;
ssl_dhparam             /etc/letsencrypt/ssl-dhparams.pem;

# Session resumption — 10 MB ≈ 40 k sessions, well above the 50-CCU MVD ceiling.
# Tickets off: PFS preserved via the session cache instead, no key rotation worry.
ssl_session_cache       shared:SSL:10m;
ssl_session_timeout     1d;
ssl_session_tickets     off;

# OCSP stapling — one fewer round-trip on the TLS handshake.
# resolver is mandatory: NGINX won't resolve the OCSP responder hostname
# without it. Cloudflare DNS — public, anycast, fast, no logging.
ssl_stapling            on;
ssl_stapling_verify     on;
resolver                1.1.1.1 1.0.0.1 valid=300s ipv6=off;
resolver_timeout        5s;

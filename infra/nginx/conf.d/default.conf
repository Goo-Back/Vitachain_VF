# VitaChain — public vhost (INF-01 + INF-03 + INF-04 + INF-06)
# :80 = ACME challenge + 301 redirect. All application traffic on :443.
# Rate-limiting insertion point marked "AUTH-08 — RATE LIMITS HERE".

upstream vita_frontend {
    # Docker's embedded DNS resolves the service name on vita_net.
    server frontend:3000;
    keepalive 32;
}

upstream vita_backend {
    server backend:8000;
    keepalive 32;
}

# INF-08 — Uptime Kuma upstream. Resolves on vita_net via Docker's DNS.
upstream vita_uptime_kuma {
    server uptime_kuma:3001;
    keepalive 8;
}

# -----------------------------------------------------------------------------
# :80 — ACME challenge + redirect-everything-else. No application logic.
# -----------------------------------------------------------------------------
server {
    listen 80 default_server;
    server_name vitachain.ma www.vitachain.ma _;

    # ACME http-01 challenge. MUST be served unencrypted from the webroot
    # certbot writes to. Anything that bypasses this 301-redirects the
    # Let's Encrypt validation request, which fails the issuance.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # NGINX-local liveness — kept on :80 so the container healthcheck doesn't
    # need to deal with TLS verification against a self-signed snake oil cert
    # on first boot before the real cert exists.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Everything else: hard redirect to HTTPS, preserving path + query.
    location / {
        return 301 https://$host$request_uri;
    }

    server_tokens off;
}

# -----------------------------------------------------------------------------
# :443 — the application listener. HSTS, modern TLS, then the same
# /api/v1/ + / proxy_pass blocks from INF-01/03/04.
#
# CHICKEN-AND-EGG NOTE: on a fresh VPS the cert files referenced from
# tls.conf don't exist yet, so this block crashes nginx -t. On first deploy,
# comment this entire block out, run `make -C infra issue-cert`, then
# uncomment. See docs/stories/INF-06-https-letsencrypt-certbot.md §5.11.
# -----------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2  on;                            # NGINX ≥ 1.25 directive form
    server_name vitachain.ma www.vitachain.ma;

    include /etc/nginx/conf.d/tls.conf;

    # HSTS — `always` makes the header ride on error responses too. Without
    # it, a 502 wouldn't ship HSTS and the hstspreload.org submission would
    # be rejected on the "redirects use HTTPS at the first hop" check.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Defence-in-depth headers (cheap, no behaviour change).
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-Frame-Options           "DENY"                            always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ----- AUTH-08 — RATE LIMITS HERE ---------------------------------------
    # Zones, geo whitelist, and method-aware maps are declared at http {}
    # scope in 00-rate-limits.conf (rendered from templates/ by envsubst).
    # This block only applies per-location limit_req + the global conn caps.

    # Global connection caps (slowloris + per-vhost backstop).
    limit_conn perip      50;
    limit_conn perserver  5000;

    # Branded 429 page. `internal` prevents direct hits from bypassing the
    # rate limiter; `try_files /429.html =429` refuses to silently 200 if
    # the bind-mounted asset is missing.
    error_page 429 = @ratelimited;
    location @ratelimited {
        internal;
        add_header Retry-After      $sent_http_retry_after  always;
        add_header X-RateLimit-Hit  "1"                     always;
        add_header Cache-Control    "no-store"              always;
        default_type text/html;
        root /usr/share/nginx/html;
        try_files /429.html =429;
    }

    location = /healthz {
        # Whitelisted by both the geo block (VPS public IP) and the lack of
        # any `limit_req` directive here. Uptime Kuma can hammer this at will.
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    location = /429.html {
        # Direct access to the asset is harmless; serve it without going
        # through the @ratelimited internal hop.
        root /usr/share/nginx/html;
    }

    # ---- INF-08 — Uptime Kuma admin UI ------------------------------------
    # Path-prefix proxy (no extra SAN on the LE cert). Basic-auth gates the
    # admin UI; htpasswd file lives in the `nginx_htpasswd` named volume,
    # seeded by the §5.10 step 4 one-shot. Kuma uses WebSockets for the live
    # charts on the dashboard, so we keep the Upgrade/Connection headers.
    location /uptime/ {
        auth_basic           "VitaChain Uptime";
        auth_basic_user_file /etc/nginx/htpasswd/uptime.htpasswd;

        # AUTH-08: defence-in-depth on the basic-auth gate. Whitelist short-
        # circuits the bucket for ops IPs (the operator is the only legit user).
        limit_req zone=public_write burst=20 nodelay;

        proxy_pass         http://vita_uptime_kuma/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 86400;
    }

    # ---- AUTH-08 — Backend (FastAPI), split per public endpoint -----------
    # Order matters: most-specific first. NGINX picks the longest exact /
    # `^~` prefix match; the catch-all `location /api/v1/` at the end of
    # the block traps anything we forgot to split out.

    # Auth password grant + refresh exchange — the brute-force target.
    # 5 req/min/IP, burst 10 nodelay. Anti brute-force ceiling per §4.2.
    location = /api/v1/auth/token {
        limit_req zone=auth_grant burst=10 nodelay;
        include /etc/nginx/snippets/limit-headers.conf;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    # Account creation. 3 req/min/IP — caps mass account creation while
    # leaving plenty of headroom for residential NAT families.
    location = /api/v1/auth/register {
        limit_req zone=auth_register burst=5 nodelay;
        include /etc/nginx/snippets/limit-headers.conf;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    # KYC document upload (AUTH-06). 2 req/min/IP. Body size capped lower
    # than the global 10m (most ID-card scans fit in 5 MB).
    location ^~ /api/v1/auth/kyc/ {
        limit_req zone=auth_upload burst=3 nodelay;
        client_max_body_size 5m;
        include /etc/nginx/snippets/limit-headers.conf;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    # Auth catch-all (anything under /auth/ not split above) — same tight
    # bucket as the grant endpoint. Avoids accidental untracked auth paths.
    location ^~ /api/v1/auth/ {
        limit_req zone=auth_grant burst=10 nodelay;
        include /etc/nginx/snippets/limit-headers.conf;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    # KAT-03 — ESP32 telemetry ingest. Keyed on the device API key (NOT IP)
    # so a leaked key cannot be amplified from N attacker IPs. SLA path:
    # tight upstream timeouts to preserve the 50 ms p50.
    location = /api/v1/katara/ingest {
        limit_req zone=iot_ingest burst=20 nodelay;
        include /etc/nginx/snippets/limit-headers.conf;
        include /etc/nginx/snippets/proxy-backend.conf;
        proxy_connect_timeout 500ms;
        proxy_send_timeout    2s;
        proxy_read_timeout    2s;
    }

    # SEC-04 reservations — the BR-S2 race target. Tight bucket lets the
    # database-layer atomicity resolve contention without queuing 9,999
    # doomed-409 requests through the FastAPI worker pool.
    location ^~ /api/v1/secondserve/reservations {
        limit_req zone=mutate_strict burst=5 nodelay;
        include /etc/nginx/snippets/limit-headers.conf;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    # SecondServe meals — method-aware via stacked limit_req:
    #   * meals_strict (10r/m burst 5) — empty-key-skipped on GET/HEAD per the
    #     `$meals_strict_key` map; fires only on POST/PUT/PATCH/DELETE.
    #   * public_read (60r/m burst 120) — fires on every request.
    # NGINX evaluates both; the stricter rejection wins.
    location = /api/v1/secondserve/meals {
        limit_req zone=meals_strict burst=5   nodelay;
        limit_req zone=public_read  burst=120 nodelay;
        include /etc/nginx/snippets/limit-headers.conf;
        include /etc/nginx/snippets/proxy-backend.conf;
    }
    location ^~ /api/v1/secondserve/meals/ {
        limit_req zone=meals_strict burst=5   nodelay;
        limit_req zone=public_read  burst=120 nodelay;
        include /etc/nginx/snippets/limit-headers.conf;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    # FarMarket — the Brevo-trigger contact path (FAR-04). Regex location:
    # only the per-ad contact endpoint, capped at the Brevo-safe rate.
    # NOTE: the FarMarket ads prefix below uses a *plain* prefix (no `^~`),
    # so NGINX still evaluates this regex first per the standard precedence
    # (= → ^~ → ~ → prefix).
    location ~ ^/api/v1/farmarket/ads/[^/]+/contact$ {
        limit_req zone=public_write burst=12 nodelay;
        include /etc/nginx/snippets/limit-headers.conf;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    # FarMarket ads — method-aware split mirrors SecondServe meals (stacked
    # limit_req with empty-key-skip on GET/HEAD). Plain prefix (no `^~`) —
    # see contact regex above for why.
    location = /api/v1/farmarket/ads {
        limit_req zone=ads_strict  burst=5   nodelay;
        limit_req zone=public_read burst=120 nodelay;
        include /etc/nginx/snippets/limit-headers.conf;
        include /etc/nginx/snippets/proxy-backend.conf;
    }
    location /api/v1/farmarket/ads/ {
        limit_req zone=ads_strict  burst=5   nodelay;
        limit_req zone=public_read burst=120 nodelay;
        include /etc/nginx/snippets/limit-headers.conf;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    # BotaBa9a lead intake — the BR-B2 Database Webhook → Brevo email
    # trigger. Same per-IP ceiling as the FarMarket contact form.
    location = /api/v1/botabaqa/leads {
        limit_req zone=public_write burst=12 nodelay;
        include /etc/nginx/snippets/limit-headers.conf;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    # Admin shell — defence-in-depth on top of AUTH-04 RLS + verified-admin
    # role gates. Strict bucket so even with a stolen admin token an attacker
    # cannot script bulk destructive ops at line rate.
    location ^~ /api/v1/admin/ {
        limit_req zone=mutate_strict burst=5 nodelay;
        include /etc/nginx/snippets/limit-headers.conf;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    # Backend catch-all — anything under /api/v1/ that didn't match the
    # specific splits above. Loose bucket = generous default; we tighten
    # individual paths as new endpoints land.
    location /api/v1/ {
        limit_req zone=public_read burst=120 nodelay;
        include /etc/nginx/snippets/limit-headers.conf;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    # ---- Frontend (Next.js) ------------------------------------------------
    location / {
        # AUTH-08: loose bucket; covers SSR pages, static assets, and the
        # SEC-02 map pan-and-zoom interactive burst (60r/m + burst 120 nodelay
        # ≈ 2-minute interactive headroom before throttling kicks in).
        limit_req zone=public_read burst=120 nodelay;

        proxy_pass         http://vita_frontend;
        proxy_http_version 1.1;

        # Required for Next.js to see the real client + correct host in
        # server actions and absolute-URL helpers. $scheme is 'https' here.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_connect_timeout 5s;

        proxy_intercept_errors on;
        error_page 502 503 504 /50x.html;
    }

    # AUTH-08 — TLS handshake + slowloris cap is `limit_conn` above.
    server_tokens off;
    client_max_body_size 5m;   # bumped per-location for /api/v1/ above.
}

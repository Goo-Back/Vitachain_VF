      - id: KAT-10
        title: Diagnostic status polling (PENDING/PROCESSING/COMPLETED)
        priority: Must
        status: IN_REVIEW    # local DONE 2026-05-17; flips DONE after staging round-trip (verified FARMER on /dashboard/farmer/parcels/<id> clicks "Demander un diagnostic IA" → yellow PENDING chip appears < 1s from KAT-07 POST response → blue PROCESSING chip appears within 5s of KAT-08 worker pickup via the polling tick → green COMPLETED chip appears within 5s of KAT-08 finishing, total click-to-green < 35s end-to-end; DevTools Network panel shows exactly 5-6 /diagnostics/latest GETs spaced 5s apart during the in-flight window and ZERO further GETs after terminal status; tab-hidden interval shows zero GETs and tab-refocus fires exactly one catch-up GET within 1s of visibilitychange; React DevTools Profiler shows ≤3 DiagnosticSection renders across the full lifecycle thanks to the no-op state guard) and `pnpm --filter frontend test DiagnosticSection.polling` green. NO backend code (GET /diagnostics/latest stable since KAT-07), NO migration, NO worker, NO Brevo template, NO env-var change — KAT-10 is 100% frontend, the inverse of KAT-09. Artefacts: frontend/src/hooks/usePolling.ts (~40-line visibility-aware fixed-interval polling hook — useEffect schedules setInterval keyed on (enabled, intervalMs, label); callbackRef decouples the latest callback identity from the interval so each render does not re-schedule per Dan Abramov's "Making setInterval Declarative" pattern; busyRef guarantees at-most-one in-flight callback even if a slow /latest response exceeds intervalMs; document.visibilitychange listener skips ticks while document.visibilityState === "hidden" and fires an immediate catch-up tick on transition to "visible" so a refocused tab does not wait up to 5s; errors swallowed with dev-only console.warn; cleanup clears interval + removes the visibilitychange listener so navigation away from the parcel page stops polling; deliberately minimal — no exponential back-off, no retry, no SWR-style cache, no auto-fire-on-mount because the page already passes a fresh initialDiagnostic via SSR); frontend/src/app/dashboard/farmer/parcels/[id]/DiagnosticSection.tsx (in-place edit — added imports for usePolling + fetchLatestDiagnostic; added POLLING_INTERVAL_MS=5000 + TERMINAL_STATUSES Set<"COMPLETED"|"FAILED">; replaced the KAT-07 placeholder comment on useState(initialDiagnostic); added the usePolling block with `enabled: diagnostic !== null && !TERMINAL_STATUSES.has(diagnostic.status)` + a callback that calls fetchLatestDiagnostic(parcelId), guards row.parcel_id !== parcelId against rapid route changes, and uses the functional setDiagnostic(prev => prev.id===row.id && prev.status===row.status ? prev : row) form to avoid stale-closure reads and skip re-renders when the server returns identical state; all existing JSX — STATUS_CHIP chip, COMPLETED <details> card, FAILED inline message — untouched and now re-renders automatically via the polled state); frontend/__tests__/DiagnosticSection.polling.test.tsx (5 Vitest scenarios under `@vitest-environment jsdom` — S1 PENDING→PROCESSING→COMPLETED transitions stop polling after terminal, fetch called exactly twice; S2 initial COMPLETED → fetch never called even after 20s of fake time; S3 initial null diagnostic → fetch never called; S4 tab-hidden interval skips ticks, visibilitychange to visible fires exactly one catch-up; S5 cross-parcel response is ignored — chip stays on "En cours…", does not advance to "Complété"; vi.mock hoists the diagnostic-actions module so the "use server" file's createSupabaseServerClient is never reached at test import time; vi.useFakeTimers() + vi.advanceTimersByTimeAsync simulates ticks in ms; Object.defineProperty(document, "visibilityState") workaround for jsdom's missing Page Visibility API); frontend/__tests__/setup.ts (loads @testing-library/jest-dom/vitest for the toBeInTheDocument matcher); frontend/vitest.config.mts (added esbuild.jsx: "automatic" so .tsx component tests don't need an explicit `import React`; added setupFiles=["./__tests__/setup.ts"]); frontend/package.json (added devDependencies — @testing-library/react ^16.1, @testing-library/jest-dom ^6.6, @testing-library/dom ^10.4, jsdom ^25 — INF-03 had only the node-env Vitest scaffold; these unblock all future React component tests). Design decisions: pull-polling at 5s vs Supabase Realtime push — the 30s p95 end-to-end window means 5-6 HTTP requests per diagnostic, well under any Supabase free-tier read budget per PRD §11.1; Realtime would need a publication policy + RLS-aware channel filter + AUTH-07 matrix update for marginal sub-second-latency benefit and is a one-file post-MVD swap (delete usePolling, replace with channel subscription); 5s interval vs 2s/10s — 2s overshoots with 60% wasted PROCESSING→PROCESSING ticks, 10s undershoots the demo's "visible chip animation" expectation, 5s is the sweet spot that yields 5-6 polls per diagnostic with PENDING→PROCESSING captured on tick 1-2 and PROCESSING→COMPLETED captured within 5s of actual completion; custom usePolling vs useSWR({refreshInterval}) — useSWR adds a global cache + revalidate-on-focus default + a dep the rest of the codebase does not use (KAT-04/KAT-05 do their own polling for telemetry), the ~40-line custom hook is reusable for KAT-11 device-offline detection with zero modification and is the smallest-blast-radius migration target if the codebase ever consolidates around SWR/TanStack Query; visibility-aware pause is mandatory not nice-to-have — without it, 50+ farmers each leaving a tab open overnight would generate background polling load multiplicatively; no-op setState guard prevents re-render thrash during the PROCESSING→PROCESSING window — every 5s the server returns the same row, and without the prev.id===row.id && prev.status===row.status early-return inside the functional setter, React would re-render the parent + all descendants every tick (currently none, but future expansion could include an expensive markdown preview); functional setDiagnostic(prev => ...) form rather than closure read because the polling callback is created once per (enabled,intervalMs,label) change and would otherwise close over a stale `diagnostic` value defeating the guard. The §10 hand-off notes (KAT-11 can reuse usePolling verbatim, KAT-04/KAT-05 telemetry refresh could harmonise onto it post-MVD, Supabase Realtime migration is a single-file swap, chip i18n / a11y / diagnostic-history are out-of-scope follow-ups) carry forward to whichever story picks them up. Scenario A demo-day chain now reads end-to-end without a page reload: FARMER click → yellow PENDING → blue PROCESSING within 5s → green COMPLETED within 30s → email arrives on demo phone (KAT-09) — the four-story spine (KAT-07→08→09→10) of PRD §12 Demo Scenario A is complete.

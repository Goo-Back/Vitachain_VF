katara_farmer_parcels_overview view aggregating per-parcel summary (3 CTEs: latest_per_parcel via distinct-on over the (parcel_id, recorded_at desc) index from KAT-03, device_mix as count(*) filter (where status=...) by parcel_id, breach_check as bool_or over enabled thresholds against the latest reading), final left-join chain from m1_katara_parcels so brand-new parcels appear with zero counts + null timestamp (empty-card state), comment with the four-policy RLS-inheritance contract. No table changes, no RLS policy changes — RLS composes via the four base tables' auth.uid() = farmer_id predicates. Artefacts: db/migrations/0028_kat14_farmer_overview.sql (view); backend/app/modules/katara/schemas.py (ParcelOverviewEntry + FarmKpiRollup + FarmerOverviewResponse pydantic models — entry omits soil_temperature/soil_ph/soil_conductivity to keep the dashboard payload tight; Decimal preserved for surface area); backend/app/modules/katara/overview.py (NEW module with /katara/farmers/me/overview router; reads the view under user-JWT via get_db_for_user, sums KPI in Python over N ≤ 10 parcels rather than a second SQL pass, sets Cache-Control: private, max-age=60); backend/app/main.py (wires katara_overview_router); frontend/src/app/dashboard/farmer/page.tsx (NEW — server component, role-gates non-FARMER to /dashboard, renders <EmptyState> when zero parcels else <KpiStrip> + <ParcelGrid>); frontend/src/app/dashboard/farmer/{overview-actions,overview-types,format}.ts (server action wrapping the FastAPI endpoint via the existing session-cookie → Bearer pattern; wire types mirroring the Pydantic shape with Decimal-as-string; tiny formatRelativeFr helper avoiding a date-fns dependency); frontend/src/app/dashboard/farmer/{KpiStrip,ParcelGrid,ParcelCard,EmptyState}.tsx (NEW — server components: KpiStrip with 4 tiles (parcels / hectares / active sensors / alertes ouvertes — breach tile flips amber when non-zero); ParcelCard with tone-derivation per §6.4 (warn for breach, neutral-warn for offline-only — deliberately distinct so an offline sensor does not get muscle-dismissed under the same red badge as a real moisture breach), aria-label per card, last-reading relative timestamp + last_soil_moisture inline; ParcelGrid as a thin responsive 1/2/3-column wrapper; EmptyState with bilingual-aware copy + CTA to /parcels/new); frontend/src/app/dashboard/farmer/parcels/[id]/ParcelSwitcher.tsx (NEW client component; horizontal pill list overflow-scrolls on narrow viewports; keyboard-navigable with aria-current; renders nothing on a single-parcel farm to avoid noise; PARCEL_SCOPED_PARAMS allow-list of {device_id} dropped on pivot + PRESERVABLE_PARAMS allow-list of {window} carried — both are explicit allow-lists not deny-lists so future query params default to dropped, the safer failure mode); frontend/src/app/dashboard/farmer/parcels/[id]/page.tsx (mounts <ParcelSwitcher> above the existing header with overview fetched in a fourth parallel server-action call, breadcrumb link "← Mes parcelles" rewritten to "← Mon exploitation" pointing at /dashboard/farmer); frontend/src/app/dashboard/page.tsx (role-agnostic root now links the FARMER chip to /dashboard/farmer "Mon exploitation" — vue d'ensemble — instead of the legacy /parcels list); db/tests/auth07_business_rules.sql (KAT-14 cells K-14a/K-14b appended — K-14a seeds 2 parcels owned by FARMER-A vs FARMER-B respectively then swaps JWT context to FARMER-A and asserts the view returns exactly the kat14-br-A1 row (cross-farmer RLS isolation holds on the view via its inherited katara_parcels_select_own predicate), K-14b queries information_schema.columns for the view and asserts the column set exactly matches the 16-element allow-list with symmetric-difference diagnostics on both directions so a future widening of the view dies at CI with the offending column name); backend/tests/test_kat14_overview.py (3 unit + 3 router-mount + 3 e2e-gated scenarios — Pydantic schema validation including no-telemetry-yet (null 
  # 2026-05-16 — KAT-03 LOCAL DONE: ESP32 telemetry ingestion endpoint shipped. Hot path /api/v1/katara/ingest
  # composes the bcrypt-verify + insert + device-touch + NOTIFY into a single SECURITY DEFINER SQL function
  # (public.m1_katara_ingest, granted EXECUTE to service_role only) so the FastAPI handler issues exactly
  # one DB round-trip per request. The m1_katara_telemetry table is FORCE-RLS with no INSERT/UPDATE/DELETE
  # policy (append-only by design — KAT-13 leans on the invariant) and ships three indexes: (device_id,
  # recorded_at DESC) for charts, (parcel_id, recorded_at DESC) for KAT-08's 7-day average, and the
  # (device_id, recorded_at) dedup unique that turns a replay into a silent 204 via ON CONFLICT DO UPDATE
  # rather than a 409 retry-loop. Denormalisation trigger fills parcel_id + farmer_id from the device row
  # so downstream queries skip a join; a sibling trigger emits NOTIFY katara_telemetry_inserted for KAT-06's
  # threshold worker. The handler authenticates the device via X-Device-Id + X-Device-Api-Key headers (never
  # a JWT) and replies 204 No Content carrying X-Telemetry-Id for log correlation; failures return 401 with
  # the constant string `invalid_device_credentials` whether the device_id or the api_key (or both) was wrong
  # so a probe cannot enumerate paired devices. AUTH-05 is satisfied with a new ALLOW_PREFIXES entry
  # (`modules/katara/ingest.py`) plus an inline `# JUSTIFICATION:` at the service_client() callsite. The
  # NGINX iot_ingest zone in infra/nginx/conf.d/default.conf is already keyed on the api-key header (not IP)
  # with 500ms connect + 2s read/send timeouts, so a leaked key cannot be amplified from N attacker IPs.
  # Pydantic TelemetryPayload mirrors every DB CHECK and enforces the 60 s GSM-skew future-ts guard at the
  # 422 boundary; the guard intentionally lives in Pydantic so legitimate backfills can break it (BR-KAT03 D
  # asserts no DB CHECK enforces it). The pgTAP block in auth07_business_rules.sql seeds its own parcel +
  # PENDING device, then walks the full happy path (verify -> insert -> trigger fill -> device touch ->
  # ACTIVE flip + last_seen), forged-key NULL, UNLINKED device blocked, future-ts at DB layer accepted, and
  # FARMER-B vs FARMER-A RLS isolation under the authenticated role. Spec drift (legacy air_humidity /
  # air_temperature -> soil_pH / soil_conductivity) is documented inline; the PRD + Technical_Specifications
  # update is a separate doc PR. Unblocks: KAT-04 (charts can read m1_katara_telemetry + the latest view),
  # KAT-05 / KAT-06 (threshold worker has a NOTIFY channel + payload format), KAT-08 (parcel_recorded_at
  # index covers the 7-day per-parcel aggregate Gemini consumes), KAT-11 (offline-detection CRON reads
  # last_seen written by every ingest). DoD flips to DONE on: (a) migration 0018 applied on the linked
  # Supabase project and `select relforcerowsecurity from pg_class where relname='m1_katara_telemetry'`
  # returns t; (b) staging Locust run (50 users / 60 s) p50 < 50 ms, p99 < 150 ms, 0 failures, URL of
  # ingest_stats.csv recorded; (c) 5 BR-KAT03 pgTAP cells green inside `make -C db test-auth07`;
  # (d) PRD + Tech Spec PR merged closing the spec drift.
